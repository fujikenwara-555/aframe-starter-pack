<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
  <title>FuelFinder</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:wght@400;500&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">

  <!-- Load your local config.js (gitignored). See config.example.js -->
  <script src="config.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --amber: #EF9F27;
      --amber-dark: #BA7517;
      --amber-glow: rgba(239,159,39,0.12);
      --green: #5DCAA5;
      --green-glow: rgba(93,202,165,0.12);
      --red: #E24B4A;
      --bg: #0e0d0b;
      --bg2: #161411;
      --bg3: #1e1b16;
      --bg4: #252119;
      --border: rgba(239,159,39,0.18);
      --border-hot: rgba(239,159,39,0.45);
      --text: #f0ead8;
      --text-muted: #7a7060;
      --text-dim: #3d3826;
      --mono: 'DM Mono', monospace;
      --sans: 'DM Sans', sans-serif;
      --display: 'Bebas Neue', sans-serif;
    }

    html { background: var(--bg); color: var(--text); font-family: var(--sans); }

    body {
      min-height: 100vh;
      max-width: 480px;
      margin: 0 auto;
      background: var(--bg);
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px);
      pointer-events: none;
      z-index: 1000;
    }

    /* HEADER */
    header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--border);
      background: var(--bg2);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .header-row {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 3px;
    }

    .logo {
      font-family: var(--display);
      font-size: 34px;
      letter-spacing: 2px;
      color: var(--amber);
      line-height: 1;
    }

    .logo span { color: var(--text-muted); }

    #coordDisplay {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-muted);
      text-align: right;
      line-height: 1.5;
    }

    .tagline {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }

    /* CONTROLS BAR */
    .controls {
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 10px 16px;
      display: flex;
      gap: 10px;
      align-items: center;
      flex-wrap: wrap;
    }

    .btn-locate {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: var(--amber);
      color: #0e0d0b;
      font-family: var(--display);
      font-size: 19px;
      letter-spacing: 2px;
      padding: 10px 20px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.12s;
      flex-shrink: 0;
    }

    .btn-locate:active { transform: scale(0.97); }
    .btn-locate:disabled { opacity: 0.4; cursor: not-allowed; }

    .controls-right {
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
      min-width: 0;
    }

    .pill-row {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
    }

    .pill {
      padding: 4px 10px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.5px;
      border-radius: 3px;
      cursor: pointer;
      transition: all 0.12s;
      white-space: nowrap;
    }

    .pill.active {
      border-color: var(--amber);
      color: var(--amber);
      background: var(--amber-glow);
    }

    .pill-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1px;
      color: var(--text-dim);
      text-transform: uppercase;
      align-self: center;
    }

    /* STATUS */
    #statusBar {
      padding: 8px 16px;
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      background: var(--bg3);
      border-bottom: 1px solid var(--border);
      min-height: 32px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: var(--text-dim);
      flex-shrink: 0;
    }
    .dot.active { background: var(--amber); animation: blink 1.1s infinite; }
    .dot.done   { background: var(--green); }
    .dot.err    { background: var(--red); }

    @keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.25} }

    /* STATION LIST */
    #stationList { padding: 12px 14px; display: flex; flex-direction: column; gap: 12px; }

    /* STATION CARD */
    .station-card {
      background: var(--bg3);
      border: 1px solid var(--border);
      border-radius: 8px;
      overflow: hidden;
    }

    .card-body { padding: 14px 15px 10px; }

    .card-top-row {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 8px;
      margin-bottom: 5px;
    }

    .station-name {
      font-size: 16px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.25;
      flex: 1;
    }

    .dist-badge {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--amber);
      background: var(--amber-glow);
      border: 1px solid var(--border);
      padding: 3px 8px;
      border-radius: 3px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .station-addr {
      font-size: 12px;
      color: var(--text-muted);
      margin-bottom: 10px;
      line-height: 1.4;
    }

    /* ETHANOL METER */
    .ethanol-section {
      background: var(--bg4);
      border-top: 1px solid var(--border);
      padding: 10px 15px;
    }

    .eth-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .eth-label {
      font-family: var(--mono);
      font-size: 9px;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .eth-value-row {
      display: flex;
      align-items: baseline;
      gap: 4px;
    }

    .eth-number {
      font-family: var(--display);
      font-size: 26px;
      letter-spacing: 1px;
      line-height: 1;
    }

    .eth-unit {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
    }

    .eth-count {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-muted);
    }

    .eth-bar-track {
      height: 5px;
      background: var(--text-dim);
      border-radius: 3px;
      overflow: hidden;
      margin-bottom: 6px;
    }

    .eth-bar-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.5s ease;
    }

    /* RATE INLINE */
    .rate-section {
      border-top: 1px solid var(--border);
      padding: 10px 15px;
    }

    .rate-toggle {
      width: 100%;
      background: transparent;
      border: 1px dashed var(--border);
      color: var(--text-muted);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      padding: 7px;
      border-radius: 4px;
      cursor: pointer;
      text-align: center;
      text-transform: uppercase;
      transition: all 0.12s;
    }

    .rate-toggle:hover {
      border-color: var(--amber);
      color: var(--amber);
    }

    .rate-form {
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    .rate-form.open { display: flex; }

    .rate-prompt {
      font-family: var(--mono);
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 2px;
    }

    /* Ethanol slider */
    .eth-slider-wrap {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .eth-slider-top {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }

    .eth-slider-readout {
      font-family: var(--display);
      font-size: 36px;
      color: var(--green);
      letter-spacing: 2px;
      line-height: 1;
    }

    .eth-slider-hint {
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-align: right;
      line-height: 1.6;
    }

    .eth-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 100%;
      height: 6px;
      border-radius: 3px;
      background: var(--text-dim);
      outline: none;
      cursor: pointer;
    }

    .eth-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--green);
      cursor: pointer;
      border: 3px solid var(--bg3);
    }

    .eth-slider::-moz-range-thumb {
      width: 26px;
      height: 26px;
      border-radius: 50%;
      background: var(--green);
      cursor: pointer;
      border: 3px solid var(--bg3);
    }

    .eth-tick-row {
      display: flex;
      justify-content: space-between;
      font-family: var(--mono);
      font-size: 9px;
      color: var(--text-dim);
      letter-spacing: 0.5px;
      padding: 0 2px;
    }

    .submit-inline {
      padding: 10px;
      background: var(--green);
      color: #0a1f18;
      font-family: var(--display);
      font-size: 17px;
      letter-spacing: 2px;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.12s;
    }

    .submit-inline:active { transform: scale(0.98); }
    .submit-inline:disabled { opacity: 0.35; }

    /* NAV BUTTONS */
    .card-actions {
      display: grid;
      grid-template-columns: 1fr 1fr;
      border-top: 1px solid var(--border);
    }

    .card-btn {
      padding: 11px 8px;
      background: transparent;
      border: none;
      color: var(--amber);
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 5px;
      transition: background 0.12s;
      text-decoration: none;
    }

    .card-btn:active { background: var(--amber-glow); }
    .card-btn + .card-btn { border-left: 1px solid var(--border); }

    /* EMPTY / ERROR */
    .empty-state {
      padding: 52px 20px;
      text-align: center;
    }

    .empty-icon {
      font-size: 44px;
      margin-bottom: 14px;
      opacity: 0.2;
    }

    .empty-text {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-muted);
      letter-spacing: 1px;
      text-transform: uppercase;
      line-height: 1.8;
    }

    /* TOAST */
    #toast {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%) translateY(70px);
      background: var(--bg3);
      border: 1px solid var(--border-hot);
      color: var(--text);
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 1px;
      padding: 11px 22px;
      border-radius: 4px;
      transition: transform 0.22s ease;
      z-index: 9999;
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    ::-webkit-scrollbar { width: 3px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--text-dim); border-radius: 2px; }
  </style>
</head>
<body>

<header>
  <div class="header-row">
    <div class="logo">Fuel<span>/</span>Finder</div>
    <div id="coordDisplay"></div>
  </div>
  <div class="tagline">E85 Locator · Ethanol Content Ratings</div>
</header>

<div class="controls">
  <button class="btn-locate" id="findBtn" onclick="findStations()">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
      <path d="M9 1C6.24 1 4 3.24 4 6c0 3.94 5 11 5 11s5-7.06 5-11c0-2.76-2.24-5-5-5z" stroke="#0e0d0b" stroke-width="1.6"/>
      <circle cx="9" cy="6" r="2" stroke="#0e0d0b" stroke-width="1.6"/>
    </svg>
    LOCATE E85
  </button>

  <div class="controls-right">
    <div class="pill-row">
      <span class="pill-label">Radius</span>
      <button class="pill" onclick="setRadius(5,this)">5 mi</button>
      <button class="pill active" onclick="setRadius(10,this)">10 mi</button>
      <button class="pill" onclick="setRadius(25,this)">25 mi</button>
      <button class="pill" onclick="setRadius(50,this)">50 mi</button>
    </div>
    <div class="pill-row">
      <span class="pill-label">Sort</span>
      <button class="pill active" id="sortDist" onclick="sortBy('distance',this)">Distance</button>
      <button class="pill" id="sortEth" onclick="sortBy('ethanol',this)">Ethanol %</button>
    </div>
  </div>
</div>

<div id="statusBar">
  <div class="dot" id="dot"></div>
  <span id="statusText">Tap "Locate E85" to find nearby stations</span>
</div>

<div id="stationList"></div>

<div id="toast"></div>

<script>
  // ── Keys ────────────────────────────────────────────────────────
  // CONFIG is loaded from config.js (gitignored). Falls back to DEMO_KEY.
  const NREL_KEY    = (typeof CONFIG !== 'undefined' && CONFIG.NREL_KEY)    ? CONFIG.NREL_KEY    : 'DEMO_KEY';
  const IPINFO_KEY  = (typeof CONFIG !== 'undefined' && CONFIG.IPINFO_KEY)  ? CONFIG.IPINFO_KEY  : '';

  // ── State ────────────────────────────────────────────────────────
  let radius      = 10;
  let sortMode    = 'distance';   // 'distance' | 'ethanol'
  let stations    = [];           // raw from API
  let userLat     = null;
  let userLon     = null;

  // ratings: { stationId -> [{pct, ts}] }
  let ratings = JSON.parse(localStorage.getItem('ff_eth_ratings') || '{}');

  // ── Helpers ──────────────────────────────────────────────────────
  function haversine(lat1, lon1, lat2, lon2) {
    const R = 3958.8, r = Math.PI / 180;
    const dLat = (lat2 - lat1) * r, dLon = (lon2 - lon1) * r;
    const a = Math.sin(dLat/2)**2 + Math.cos(lat1*r) * Math.cos(lat2*r) * Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
  }

  function stationRatings(id) { return ratings[id] || []; }

  function avgEth(id) {
    const arr = stationRatings(id);
    if (!arr.length) return null;
    return Math.round(arr.reduce((s, r) => s + r.pct, 0) / arr.length);
  }

  function ethColor(pct) {
    // green = high ethanol, amber = mid, muted = low
    if (pct >= 75) return 'var(--green)';
    if (pct >= 60) return 'var(--amber)';
    return 'var(--red)';
  }

  function ethBarPct(pct) {
    return pct; // 0–100 maps directly
  }

  function setStatus(msg, state) {
    document.getElementById('statusText').textContent = msg;
    document.getElementById('dot').className = 'dot' + (state ? ' ' + state : '');
  }

  function showToast(msg) {
    const t = document.getElementById('toast');
    t.textContent = msg;
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
  }

  function saveRatings() {
    localStorage.setItem('ff_eth_ratings', JSON.stringify(ratings));
  }

  // ── Controls ─────────────────────────────────────────────────────
  function setRadius(r, el) {
    radius = r;
    document.querySelectorAll('.pill').forEach(p => {
      if (['5 mi','10 mi','25 mi','50 mi'].includes(p.textContent)) p.classList.remove('active');
    });
    el.classList.add('active');
  }

  function sortBy(mode, el) {
    sortMode = mode;
    document.getElementById('sortDist').classList.toggle('active', mode === 'distance');
    document.getElementById('sortEth').classList.toggle('active', mode === 'ethanol');
    if (stations.length) renderStations();
  }

  // ── Find ─────────────────────────────────────────────────────────
  function findStations() {
    document.getElementById('findBtn').disabled = true;
    document.getElementById('stationList').innerHTML = '';
    setStatus('Acquiring GPS location...', 'active');

    navigator.geolocation.getCurrentPosition(
      pos => fetchStations(pos.coords.latitude, pos.coords.longitude),
      () => {
        // fallback: IP geolocation
        setStatus('GPS unavailable — using IP location...', 'active');
        ipFallback();
      },
      { enableHighAccuracy: true, timeout: 8000, maximumAge: 0 }
    );
  }

  async function ipFallback() {
    try {
      const url = IPINFO_KEY
        ? `https://ipinfo.io/json?token=${IPINFO_KEY}`
        : `https://api.ipify.org?format=json`;
      const res = await fetch(url);
      const data = await res.json();
      if (data.loc) {
        const [lat, lon] = data.loc.split(',').map(Number);
        fetchStations(lat, lon);
      } else {
        setStatus('Could not determine location.', 'err');
        document.getElementById('findBtn').disabled = false;
      }
    } catch {
      setStatus('Location lookup failed.', 'err');
      document.getElementById('findBtn').disabled = false;
    }
  }

  async function fetchStations(lat, lon) {
    userLat = lat; userLon = lon;
    document.getElementById('coordDisplay').textContent =
      lat.toFixed(4) + '\n' + lon.toFixed(4);
    setStatus(`Searching ${radius} mi for E85...`, 'active');

    const url = `https://developer.nrel.gov/api/alt-fuel-stations/v1/nearest.json` +
      `?fuel_type=E85&latitude=${lat}&longitude=${lon}&radius=${radius}&limit=20&api_key=${NREL_KEY}`;

    try {
      const res  = await fetch(url);
      const data = await res.json();
      stations   = (data.fuel_stations || []).map(s => ({
        ...s,
        _dist: haversine(lat, lon, s.latitude, s.longitude)
      }));

      document.getElementById('findBtn').disabled = false;

      if (!stations.length) {
        setStatus(`No E85 stations within ${radius} mi.`, 'err');
        document.getElementById('stationList').innerHTML = `
          <div class="empty-state">
            <div class="empty-icon">⛽</div>
            <div class="empty-text">Nothing found — try a larger radius</div>
          </div>`;
        return;
      }

      setStatus(`${stations.length} station${stations.length>1?'s':''} found · sorted by ${sortMode}`, 'done');
      renderStations();
    } catch (e) {
      setStatus('API error — check key or connection.', 'err');
      document.getElementById('findBtn').disabled = false;
    }
  }

  // ── Render ────────────────────────────────────────────────────────
  function renderStations() {
    let sorted = [...stations];

    if (sortMode === 'ethanol') {
      sorted.sort((a, b) => {
        const ea = avgEth(a.id) ?? -1;
        const eb = avgEth(b.id) ?? -1;
        if (ea === eb) return a._dist - b._dist;
        return eb - ea;   // highest ethanol first
      });
    } else {
      sorted.sort((a, b) => a._dist - b._dist);
    }

    setStatus(`${sorted.length} station${sorted.length>1?'s':''} · sorted by ${sortMode}`, 'done');

    const list = document.getElementById('stationList');
    list.innerHTML = sorted.map(s => stationCard(s)).join('');
  }

  function stationCard(s) {
    const id       = s.id;
    const dist     = s._dist.toFixed(1);
    const arr      = stationRatings(id);
    const avg      = avgEth(id);
    const count    = arr.length;
    const gmaps    = `https://www.google.com/maps/dir/?api=1&destination=${s.latitude},${s.longitude}&travelmode=driving`;
    const apple    = `maps://maps.apple.com/?daddr=${s.latitude},${s.longitude}&dirflg=d`;

    // ethanol meter
    let ethBlock = '';
    if (avg !== null) {
      const color  = ethColor(avg);
      const barPct = ethBarPct(avg);
      ethBlock = `
        <div class="ethanol-section">
          <div class="eth-header">
            <div>
              <div class="eth-label">Community Ethanol Content</div>
              <div class="eth-count">${count} report${count !== 1 ? 's' : ''}</div>
            </div>
            <div class="eth-value-row">
              <div class="eth-number" style="color:${color}">${avg}</div>
              <div class="eth-unit">%</div>
            </div>
          </div>
          <div class="eth-bar-track">
            <div class="eth-bar-fill" style="width:${barPct}%;background:${color}"></div>
          </div>
        </div>`;
    } else {
      ethBlock = `
        <div class="ethanol-section">
          <div class="eth-label" style="color:var(--text-dim)">No ethanol reports yet</div>
        </div>`;
    }

    const rateBlock = `
      <div class="rate-section" id="ratesec-${id}">
        <button class="rate-toggle" onclick="toggleRate(${id})">+ Report Ethanol Content</button>
        <div class="rate-form" id="rateform-${id}">
          <div class="rate-prompt">Drag to set ethanol % received:</div>
          <div class="eth-slider-wrap">
            <div class="eth-slider-top">
              <div class="eth-slider-readout" id="sliderval-${id}">E50</div>
              <div class="eth-slider-hint">E0 = gasoline<br>E85 = standard flex<br>E100 = pure ethanol</div>
            </div>
            <input type="range" class="eth-slider" min="0" max="100" value="50" step="1"
              id="slider-${id}"
              oninput="updateSlider(${id}, this.value)">
            <div class="eth-tick-row">
              <span>E0</span><span>E25</span><span>E50</span><span>E75</span><span>E100</span>
            </div>
          </div>
          <button class="submit-inline" onclick="submitRating(${id})" id="submitbtn-${id}">
            Submit Report
          </button>
        </div>
      </div>`;

    return `
      <div class="station-card" id="card-${id}">
        <div class="card-body">
          <div class="card-top-row">
            <div class="station-name">${s.station_name}</div>
            <div class="dist-badge">${dist} mi</div>
          </div>
          <div class="station-addr">${s.street_address}, ${s.city}, ${s.state}</div>
        </div>
        ${ethBlock}
        ${rateBlock}
        <div class="card-actions">
          <a class="card-btn" href="${gmaps}" target="_blank">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <path d="M6.5 1C4.57 1 3 2.57 3 4.5c0 2.79 3.5 7.5 3.5 7.5S10 7.29 10 4.5C10 2.57 8.43 1 6.5 1z" stroke="currentColor" stroke-width="1.4"/>
              <circle cx="6.5" cy="4.5" r="1.3" stroke="currentColor" stroke-width="1.4"/>
            </svg>
            Google Maps
          </a>
          <a class="card-btn" href="${apple}" target="_blank">
            <svg width="13" height="13" viewBox="0 0 13 13" fill="none">
              <path d="M6.5 1C4.57 1 3 2.57 3 4.5c0 2.79 3.5 7.5 3.5 7.5S10 7.29 10 4.5C10 2.57 8.43 1 6.5 1z" stroke="currentColor" stroke-width="1.4"/>
              <circle cx="6.5" cy="4.5" r="1.3" stroke="currentColor" stroke-width="1.4"/>
            </svg>
            Apple Maps
          </a>
        </div>
      </div>`;
  }

  // ── Rating interactions ──────────────────────────────────────────
  function toggleRate(id) {
    const form = document.getElementById('rateform-' + id);
    form.classList.toggle('open');
  }

  function updateSlider(id, val) {
    document.getElementById('sliderval-' + id).textContent = 'E' + val;
    // color the readout based on value
    const el = document.getElementById('sliderval-' + id);
    if (val >= 70) el.style.color = 'var(--green)';
    else if (val >= 40) el.style.color = 'var(--amber)';
    else el.style.color = 'var(--red)';
    // update slider track fill
    const slider = document.getElementById('slider-' + id);
    slider.style.background = `linear-gradient(to right, var(--green) ${val}%, var(--text-dim) ${val}%)`;
  }

  function submitRating(id) {
    const slider = document.getElementById('slider-' + id);
    const pct = parseInt(slider.value);

    if (!ratings[id]) ratings[id] = [];
    ratings[id].push({ pct, ts: new Date().toISOString() });
    saveRatings();

    showToast(`E${pct} reported — thanks!`);

    // re-render just this card
    const card = document.getElementById('card-' + id);
    const station = stations.find(s => s.id === id);
    if (card && station) card.outerHTML = stationCard(station);
  }
</script>
</body>
</html>
