<!DOCTYPE html>
<html>
  <head>
    <script src="https://aframe.io/releases/1.7.1/aframe.min.js"> </script>
  </head>
  <body>
    <a-scene>
      <a-assets>
<img id="sand" src="assets/sand.jpg">
<img id="sky360" src="assets/secluded_beach_4k.jpg">
      </a-assets>

      <a-sky src="#sky360"></a-sky>
      <a-plane src="#sand" position="0 0 0" rotation="-90 0 0" width="30" height="30" color="#f4d03f"></a-plane>

      <a-cylinder color="yellow" position="0 0.5 -2" radius="0.3" height="1"></a-cylinder>
      <a-cone color="#c2a05a" position="-1 0.4 -2" radius-bottom="0.4" radius-top="0" height="0.8"></a-cone>
      <a-sphere color="red" position="1 0.4 -2" radius="0.4"></a-sphere>

    </a-scene>
  </body>
</html>
